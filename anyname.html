<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container1">
    <div id="form2">
        <h2 style="color: white;font-weight: bold;font-size: 28px;font-family: monospace;">Sign Up</h2>
        <input style="border: none;outline: none;height: 30px;width: 300px;border-radius: 20px;" type="text" id="name" placeholder="Full Name" required></br>
        <input style="border: none;outline: none;height: 30px;width: 300px;border-radius: 20px;margin-top: 20px;" type="text" id="Last Name" placeholder="Username" required></br>
        <input style="border: none;outline: none;height: 30px;width: 300px;border-radius: 20px;margin-top: 20px;" type="email" id="email" placeholder="Email" required></br>
        <input style="border:none;outline: none;height: 30px;width: 300px;border-radius: 20px;margin-top: 20px;" type="password" id="password" placeholder="Password" required></br>
        <input style="border:none;outline: none;height: 30px;width: 300px;border-radius: 20px;margin-top: 20px;" type="number" id="number" placeholder="Phone Number" required></br>
        <button style="border: none;outline: none;height: 30px;width: 300px;border-radius: 20px;margin-top: 20px;background-color:#eb9b34;font-weight: bold;font-size: 18px;font-family: monospace;" type="submit">Sign Up</button></br>
        <span style="color:white;font-weight:bold;font-size:12px;font-family:monospace;margin-top:20px;">Already have an account? <a href="./index.html" style="color:#eb7a34;text-decoration:none;">Login</a></span>
        </div>




    </div>
</body>
</html>
